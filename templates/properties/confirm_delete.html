{% extends 'base.html' %}
{% block title %}Delete Property{% endblock %}
{% block page_title %}Delete Property{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-6">
    <div class="card p-4 text-center">
        <div style="font-size:3rem;color:#ef4444" class="mb-3"><i class="fas fa-trash-alt"></i></div>
        <h5 class="fw-bold">Delete "{{ property.title }}"?</h5>
        <p class="text-muted">This action cannot be undone. All associated data will be lost.</p>
        <form method="post" class="d-flex gap-2 justify-content-center mt-3">{% csrf_token %}
            <button type="submit" class="btn btn-danger px-4">Yes, Delete</button>
            <a href="/properties/" class="btn btn-outline-secondary">Cancel</a>
        </form>
    </div>
</div></div>
{% endblock %}
